on:
  issues:
    types:
      - opened
      - reopened
      - closed

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check notion database
        id: notion
        run: |
          echo '${{ toJSON(github.event.issue.labels.*.name) }}' > labels.json
          labels=$(cat labels.json)

          for data in $(labels | jq -c '.[]'); do
            result=$(jq '[.[] | { name: "$data"}]' labels.json)
            echo "$result" > labels.json
          done

          echo "$(cat labels.json)"
