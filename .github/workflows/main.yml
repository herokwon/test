on:
  push:
    branches:
      - main
jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Call Notion API
        run: |
          curl "https://api.notion.com/v1/pages/${{ secrets.NOTION_DATABASE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -X PATCH \
            --data '{
              "properties": {
                "Status": {
                  "select": {
                    "name": "Closed"
                  }
                }
              }
            }'
