on:
  issues:
    types:
      - opened
      - reopened
      - closed

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check notion database
        id: notion
        run: |
          echo '${{ toJSON(github.event.issue.labels.*.name) }}' > labels.json
          test=$(labels.json | tr -d "[]" | tr ',' '\n' | jq -R 'map({name: . | gsub("^\\s+|\\s+$"; "")})')
          echo "$test" > labels.json
          echo "$(cat labels.json)"
