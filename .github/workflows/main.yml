on:
  issues:
    types:
      - opened
      - reopened
      - closed

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check notion database
        id: notion
        run: |
          results=$(curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data '{
              "filter": {
                "property": "Link",
                "url": {
                  "equals": "${{ github.event.issue.html_url }}"
                }
              },
              "page_size": 1
            }' | jq -r '.results');

            page_id=""
            status=""

            if [ "$results" != "[]" ]; then
              page_id=$(echo "$results" | jq -r '.[0].id')
              status=$(echo "$results" | jq -r '.[0].properties.Status.select.name')
            fi

            echo "page_id=$page_id" >> $GITHUB_OUTPUT
            echo "status=$status" >> $GITHUB_OUTPUT

      - run: |
          echo "${{ steps.notion.outputs.page_id }}"
          echo "${{ steps.notion.outputs.status }}"

      - if: ${{ github.event.issue.closed_at == '' && steps.notion.outputs.page_id == '' && steps.notion.outputs.status == '' }}
        run: |
          curl -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data '{
              "parent": {
                "database_id": "${{ secrets.NOTION_DATABASE_ID }}"
              },
              "properties": {
                "Status": {
                  "select": {
                    "name": "Opened"
                  }
                },
                "Title": {
                  "title": [
                    {
                      "text": {
                        "content": "${{ github.event.issue.title }}"
                      }
                    }
                  ]
                },
                "Assignees": {
                  "multi_select": [
                    {
                      "name": "herokwon1"
                    },
                    {
                      "name": "herokwon2"
                    }
                  ]
                },
                "Labels": {
                  "multi_select": [
                    {
                      "name": "test1"
                    },
                    {
                      "name": "test2"
                    }
                  ]
                },
                "Date": {
                  "date": {
                    "start": "${{ github.event.issue.created_at }}",
                    "end": null,
                    "timezone": "Asia/Seoul"
                  }
                },
                "Link": {
                  "url": "${{ github.event.issue.html_url }}"    
                }
              }
            }'

      - if: ${{ github.event.issue.closed_at != '' && steps.notion.outputs.page_id != '' && steps.notion.outputs.status == 'Opened' }}
        run: |
          curl -X PATCH "https://api.notion.com/v1/pages/${{ steps.notion.outputs.page_id }}" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY}}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data '{
              "properties": {
                "Status": {
                  "select": {
                    "name": "Closed"
                  }
                },
                "Date": {
                  "date": {
                    "start": "${{ github.event.issue.created_at }}",
                    "end": "${{ github.event.issue.closed_at }}",
                    "timezone": "Asia/Seoul"
                  }
                }
              }
            }'
