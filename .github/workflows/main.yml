on:
  issues:
    types:
      - opened
      - reopened
      - closed

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check notion database
        id: notion
        run: |
          test="${{ github.event.issue.labels.*.name }}"
          echo "$test"
