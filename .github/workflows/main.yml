name: Notion Synchronization

on:
  issues:
    types: [opened, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-existence:
    name: Check existence
    runs-on: ubuntu-latest
    steps:
      - id: test
        run: |
          echo '${{ toJSON(github.event.issue.labels.*.name) }}' > test.json
          labels=$(cat test.json)

          for data in $(labels | jq -c '.[]'); do
            result=$(jq '[.[] + { name: "$data" }]' test.json)
            echo "$result" > test.json
          done

          echo "$(cat test.json)"
