on:
  issues:
    types:
      - opened
      - reopened
      - closed

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check notion database
        id: notion
        run: |
          echo '{ "start": "${{ github.event.issue.created_at }}", "end": null, "time_zone": "Asia/Seoul" }' > date.json
          echo '${{ toJSON(github.event.issue.assignees.*.login) }}' > assignees.json
          echo '${{ toJSON(github.event.issue.labels.*.name) }}' > labels.json
          status=""
          assignees=$(cat assignees.json)
          labels=$(cat labels.json)

          if [ "$status" == "" ]; then
            status="Opened"
          elif [ "${{ github.event.issue.closed_at }}" != "" ]; then
            status="Closed"
            date=$(jq '.end="${{ github.event.issue.closed_at }}"' date.json)
            echo "$date" > date.json
          fi

          for data in $(assignees | jq -c '.[]'); do
            result=$(jq '[.[] | { name: "$data" }]' assignees.json)
            echo "$result" > assignees.json
          done
          for data in $(labels | jq -c '.[]'); do
            result=$(jq '[.[] | { name: "$data" }]' labels.json)
            echo "$result" > labels.json
          done

          assignees=$(cat assignees.json)
          labels=$(cat labels.json)
          date=$(cat data.json)

          echo "status=$status" >> $GITHUB_OUTPUT
          echo "assignees=$assignees" >> $GITHUB_OUTPUT
          echo "labels=$labels" >> $GITHUB_OUTPUT
          echo "date=$date" >> $GITHUB_OUTPUT

      - run: echo "${{ steps.properties.outputs.date.start }}"
