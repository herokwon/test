on:
  issues:
    types:
      - opened
      - reopened

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "${{ github.event.issue.title }}"
          echo "${{ github.event.issue.assignee }}"
          echo "${{ github.event.issue.assignees }}"
          echo "${{ github.event.issue.labels }}"
          echo "${{ github.event.issue.url }}"
          echo "${{ github.event.issue.html_url }}"
