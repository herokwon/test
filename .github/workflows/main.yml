name: Notion Synchronization

on:
  issues:
    types: [opened, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-existence:
    name: Check existence
    runs-on: ubuntu-latest
    steps:
      - id: test
        run: |
          echo '${{ toJSON(github.event.issue.labels.*.name) }}' > test.json

          for data in $(echo "$(cat test.json)" | jq -c '.[]'); do
            result=$(jq '[.[] | { name: "$data" }]' test.json)
            echo "$result" > test.json
          done

          test=$(echo "$(cat jest.json)" | jq -c .)
          echo "test=$test" >> $GITHUB_OUTPUT

      - run: echo "${{ steps.test.outputs.test }}"
