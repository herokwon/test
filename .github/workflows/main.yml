on:
  issues:
    types:
      - opened
      - reopened

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
    
      - id: notion
        run: |
          page_id=$(curl -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data '{
              "parent": {
                "database_id": "${{ secrets.NOTION_DATABASE_ID }}"
              },
              "properties": {
                "Status": {
                  "select": {
                    "name": "Opened"
                  }
                },
                "Title": {
                  "title": [
                    {
                      "text": {
                        "content": "${{ github.event.issue.title }}"  
                      }
                    }  
                  ]    
                },
                "Assignees": {
                  "multi_select": [
                    {
                      "name": "herokwon1"
                    },
                    {
                      "name": "herokwon2"
                    }
                  ]
                },
                "Labels": {
                  "multi_select": [
                    {
                      "name": "test1"
                    },
                    {
                      "name": "test2"
                    }
                  ]
                },
                "Date": {
                  "date": {
                    "start": "${{ github.event.issue.created_at }}",
                    "end": null
                  }
                },
                "Link": {
                  "url": "${{ github.event.issue.html_url }}"    
                }
              }
            }' | jq -r '.id'); echo "page_id=$page_id" >> $GITHUB_OUTPUT

      - run: echo "${{ steps.notion.outputs.page_id }}"
