on:
  push:
    branches:
      - main

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Call Notion API
        run: |
          curl --location --request POST "https://api.notion.com/v1/databases/" \
            --header "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            --header "Content-Type: application/json" \
            --header "Notion-Version: 2022-06-28" \
            --data '{
              "parent": {
                "type": "page_id",
                "page_id": "${{ secrets.NOTION_DATABASE_ID }}"
              },
              "title": [
                {
                  "type": "text",
                  "text": {
                    "content": "Test Title from Github Actions",
                    "link": null
                  }
                }
              ],
              "properties": {
                "Status": {
                  "select": "opened"
                },
                "Link": {
                  "url": "test-url"
                }
              }
            }'
