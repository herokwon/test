on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up initial JSON object
        run: |
          echo '{ "start": "start", "time_zone": "Asia/Seoul" }' > data.json

      - name: Add new key-value pair to JSON object
        run: |
          UPDATED_JSON=$(jq '. + { end: "end" }' data.json)
          echo "${UPDATED_JSON}" > data.json

      - name: Output the modified JSON object
        run: |
          echo "The modified JSON object is: $(cat data.json)"
