on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add new key-value pair to JSON object
        id: add
        run: |
          echo '{ "start": "start", "end": null, "time_zone": "Asia/Seoul" }' > data.json

          result=$(jq '.end="end"' data.json)
          echo "result=$result" > data.json

      - name: Output the modified JSON object
        run: |
          echo "The modified JSON object is: $(data.json.end)"
